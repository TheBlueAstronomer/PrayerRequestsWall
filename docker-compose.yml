services:
  app:
    # Always use the image passed from deploy script/CI
    image: ${DEPLOY_IMAGE}
    restart: unless-stopped
    ports:
      - "80:3000"
    volumes:
      # Use HOST_DATA_PATH if set (prod), else default to current dir (dev)
      - ${HOST_DATA_PATH:-.}/sqlite.db:/app/sqlite.db
    environment:
      - NODE_ENV=production
    env_file:
      - .env
