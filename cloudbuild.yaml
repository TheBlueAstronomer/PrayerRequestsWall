substitutions:
  _ARTIFACT_REGION: "asia-south1"
  _REPOSITORY: "prayer-repository"
  _IMAGE_NAME: "prayer-wall-app"
  _VM_NAME: "project-intercessor"
  _VM_ZONE: "asia-south1-c"

steps:
  # Pull the cached image from Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull ${_ARTIFACT_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest || exit 0']

  # 1. Build the App Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - '${_ARTIFACT_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'
      - '-t'
      - '${_ARTIFACT_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_ARTIFACT_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'
      - '.'
    id: 'build-app'

  # 2. Push the App Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_ARTIFACT_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}'
    id: 'push-app'

  # 3. Deploy App to Compute Engine (VM)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Securely copy the Compose file to the VM's /tmp directory
        gcloud compute scp docker-compose.prod.yml deploy-user@${_VM_NAME}:/tmp/docker-compose.prod.yml --zone=${_VM_ZONE} --quiet
        
        # SSH in to move the files, pull the new images, and restart the containers
        gcloud compute ssh deploy-user@${_VM_NAME} --zone=${_VM_ZONE} --quiet --command="sudo bash -c '\
          mkdir -p /var/intercessor/app && \
          cp /tmp/docker-compose.prod.yml /var/intercessor/app/ && \
          cd /var/intercessor/app && \
          gcloud auth configure-docker ${_ARTIFACT_REGION}-docker.pkg.dev --quiet && \
          export PROJECT_ID=$PROJECT_ID && \
          docker-compose -f docker-compose.prod.yml pull && \
          docker-compose -f docker-compose.prod.yml up -d'"
    id: 'deploy-vm'

images:
  - '${_ARTIFACT_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
  - '${_ARTIFACT_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
