server {
    listen 80;
    server_name tribeprayer.org www.tribeprayer.org;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name tribeprayer.org www.tribeprayer.org;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/tribeprayer.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tribeprayer.org/privkey.pem;

    # Include basic let's encrypt TLS config if available
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to the application container
    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
