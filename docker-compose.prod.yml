version: "3.8"

services:
  app:
    image: asia-south1-docker.pkg.dev/${PROJECT_ID}/prayer-repository/prayer-wall-app:latest
    container_name: prayer-wall-app-prod
    restart: always
    shm_size: '1gb'
    expose:
      - "3000"
    volumes:
      - /var/intercessor/data/sqlite.db:/app/sqlite.db
      - /var/intercessor/data/wwebjs_auth:/app/.wwebjs_auth
    environment:
      - NODE_ENV=production
    env_file:
      - /var/intercessor/app/.env
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: "true"
        tag: "prayer-wall-app-prod"

  nginx:
    image: nginx:alpine
    container_name: prayer-wall-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /var/intercessor/data/certbot/conf:/etc/letsencrypt
      - /var/intercessor/data/certbot/www:/var/www/certbot
    depends_on:
      - app
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: "true"
        tag: "prayer-wall-nginx-prod"

  certbot:
    image: certbot/certbot
    container_name: prayer-wall-certbot
    volumes:
      - /var/intercessor/data/certbot/conf:/etc/letsencrypt
      - /var/intercessor/data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: "true"
        tag: "prayer-wall-certbot"
